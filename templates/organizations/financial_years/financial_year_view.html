{% extends 'base/base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header">

            <h4>Financial Year Details</h4>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th width="250">Financial Year</th>
                    <td>{{ financial_year.financial_year }}</td>
                </tr>

                <tr>
                    <th>Start Date</th>
                    <td>{{ financial_year.start_date }}</td>
                </tr>

                <tr>
                    <th>End Date</th>
                    <td>{{ financial_year.end_date }}</td>
                </tr>

            </table>

            <a href="{% url 'organizations:financial_year_update' financial_year.pk %}"
               class="btn btn-warning">
                Edit
            </a>

            <a href="{% url 'organizations:financial_year_list' %}"
               class="btn btn-secondary">
                Back
            </a>

        </div>

    </div>

</div>

{% endblock %}
